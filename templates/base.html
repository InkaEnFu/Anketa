<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Anketa{% endblock %} – Značka telefonu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DZ4YHBRN2Z"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-DZ4YHBRN2Z');
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('index') }}">🗳 Hlasovat</a>
            <a href="{{ url_for('results') }}">📊 Výsledky</a>
            <a href="{{ url_for('reset') }}">🔄 Reset</a>
            <a href="{{ url_for('about') }}">ℹ O anketě</a>
        </nav>
    </header>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Anketa o značkách telefonů – školní projekt 2026</p>
    </footer>
</body>
</html>
