<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Anketa{% endblock %} – Značka telefonu</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DZ4YHBRN2Z"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-DZ4YHBRN2Z');
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('index') }}">🗳 Hlasovat</a>
            <a href="{{ url_for('results') }}">📊 Výsledky</a>
            <a href="{{ url_for('about') }}">ℹ O anketě</a>
            <button id="dark-mode-toggle" class="theme-toggle" title="Přepnout tmavý/světlý režim">🌙</button>
        </nav>
    </header>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Anketa o značkách telefonů – školní projekt 2026</p>
    </footer>

    <script>
        (function() {
            var toggle = document.getElementById('dark-mode-toggle');
            var stored = localStorage.getItem('theme');
            if (stored === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                toggle.textContent = '☀️';
            }
            toggle.addEventListener('click', function() {
                var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                    toggle.textContent = '🌙';
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                    toggle.textContent = '☀️';
                }
            });
        })();
    </script>
</body>
</html>
